name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black ruff mypy pytest pytest-cov

      - name: Lint
        run: |
          python -m ruff check .
          python -m black --check .

      - name: Type check
        run: |
          python -m mypy aa examples

      - name: Run tests
        run: |
          python -m pytest -q